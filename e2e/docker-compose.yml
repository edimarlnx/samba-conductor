# E2E Tests: Full stack in Docker
#
# Usage:
#   cd e2e
#   docker compose up --build --abort-on-container-exit --exit-code-from tests
#
# Results (HTML report + screenshots) are saved to ./results/

services:
  # Samba AD DC
  samba:
    build:
      context: ../docker
      dockerfile: samba-ad-dc/Dockerfile
    container_name: e2e-samba
    hostname: dc1
    domainname: samdom.example.com
    privileged: true
    environment:
      - SAMBA_REALM=SAMDOM.EXAMPLE.COM
      - SAMBA_DOMAIN=SAMDOM
      - SAMBA_ADMIN_PASSWORD=P@ssw0rd123!
      - SAMBA_DNS_FORWARDER=8.8.8.8
    dns:
      - 127.0.0.1
    networks:
      e2e-net:
        ipv4_address: 172.21.0.10
    healthcheck:
      test: ["CMD", "samba-tool", "domain", "info", "127.0.0.1", "-U", "Administrator%P@ssw0rd123!"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  # Meteor app (production build + internal MongoDB)
  meteor:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.meteor
    container_name: e2e-meteor
    depends_on:
      samba:
        condition: service_healthy
    environment:
      - ROOT_URL=http://localhost:4080
      - PORT=4080
      - USE_INTERNAL_MONGODB=1
      - METEOR_SETTINGS={"public":{"appInfo":{"name":"Samba Conductor"}},"samba":{"ldapUrl":"ldaps://samba:636","baseDn":"DC=samdom,DC=example,DC=com","realm":"SAMDOM.EXAMPLE.COM","tlsRejectUnauthorized":false,"sessionTtlMinutes":30}}
    # Restart on crash (SyncedCron ldapjs bug causes uncaughtException)
    restart: on-failure:5
    networks:
      e2e-net:
        ipv4_address: 172.21.0.20
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4080"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # Playwright test runner
  tests:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    container_name: e2e-tests
    depends_on:
      meteor:
        condition: service_healthy
    environment:
      - BASE_URL=http://meteor:4080
      - FILTER=${FILTER:---all}
    volumes:
      - ./tests:/work/e2e/tests:ro
      - ./results:/work/e2e/results
      - ./package.json:/work/e2e/package.json:ro
    working_dir: /work/e2e
    entrypoint: ["sh", "-c", "npm install --silent 2>/dev/null && node tests/run-all.js"]
    networks:
      e2e-net:
        ipv4_address: 172.21.0.30

networks:
  e2e-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
