# E2E Tests: Full stack in Docker (all-in-one image)
#
# Usage:
#   cd e2e
#   ./run-tests.sh --compose
#   ./run-tests.sh --compose --no-cache
#   ./run-tests.sh --compose users
#
# Results (HTML report + screenshots) are saved to ./results/

services:
  # All-in-one: Samba AD DC + MongoDB + Meteor webapp
  app:
    build:
      context: ..
      dockerfile: docker/all-in-one/Dockerfile
    container_name: e2e-app
    hostname: dc1
    domainname: samdom.example.com
    privileged: true
    environment:
      - SAMBA_REALM=SAMDOM.EXAMPLE.COM
      - SAMBA_DOMAIN=SAMDOM
      - SAMBA_ADMIN_PASSWORD=P@ssw0rd123!
      - SAMBA_DNS_FORWARDER=8.8.8.8
      - ROOT_URL=http://localhost:3000
      - METEOR_SETTINGS={"samba":{"ldapUrl":"ldaps://127.0.0.1:636","baseDn":"DC=samdom,DC=example,DC=com","realm":"SAMDOM.EXAMPLE.COM","tlsRejectUnauthorized":false,"sessionTtlMinutes":30},"cron":{"enabled":false},"public":{"appInfo":{"name":"Samba Conductor"}}}
    dns:
      - 127.0.0.1
    networks:
      e2e-net:
        ipv4_address: 172.21.0.10
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # Playwright test runner
  tests:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    container_name: e2e-tests
    depends_on:
      app:
        condition: service_healthy
    environment:
      - BASE_URL=http://app:3000
      - FILTER=${FILTER:---all}
    volumes:
      - ./tests:/work/e2e/tests:ro
      - ./results:/work/e2e/results
      - ./package.json:/work/e2e/package.json:ro
    working_dir: /work/e2e
    entrypoint: ["sh", "-c", "npm install --silent 2>/dev/null && node tests/run-all.js"]
    networks:
      e2e-net:
        ipv4_address: 172.21.0.30

networks:
  e2e-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
