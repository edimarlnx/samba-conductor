services:
  samba-ad-dc:
    build:
      context: ./samba-ad-dc
      dockerfile: Dockerfile
    container_name: samba-ad-dc
    hostname: dc1
    domainname: samdom.example.com
    restart: unless-stopped
    privileged: true
    environment:
      - SAMBA_REALM=SAMDOM.EXAMPLE.COM
      - SAMBA_DOMAIN=SAMDOM
      - SAMBA_ADMIN_PASSWORD=P@ssw0rd123!
      - SAMBA_DNS_FORWARDER=8.8.8.8
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "88:88/tcp"
      - "88:88/udp"
      - "135:135/tcp"
      - "389:389/tcp"
      - "389:389/udp"
      - "445:445/tcp"
      - "464:464/tcp"
      - "464:464/udp"
      - "636:636/tcp"
      - "3268:3268/tcp"
      - "3269:3269/tcp"
    volumes:
      - samba-data:/var/lib/samba
      - samba-config:/etc/samba
      - samba-logs:/var/log/samba
    dns:
      - 127.0.0.1
    networks:
      samba-net:
        ipv4_address: 172.20.0.10

networks:
  samba-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  samba-data:
  samba-config:
  samba-logs:
