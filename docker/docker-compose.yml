# Development: Samba AD DC primary + replica
# Used alongside "meteor npm start" on the host
#
# Usage:
#   docker compose up -d              # Start primary only
#   docker compose --profile replica up -d  # Start primary + replica

services:
  # Primary DC
  samba-ad-dc:
    build:
      context: .
      dockerfile: samba-ad-dc/Dockerfile
    container_name: samba-ad-dc
    hostname: dc1
    domainname: samdom.example.com
    restart: unless-stopped
    privileged: true
    environment:
      - SAMBA_REALM=SAMDOM.EXAMPLE.COM
      - SAMBA_DOMAIN=SAMDOM
      - SAMBA_ADMIN_PASSWORD=P@ssw0rd123!
      - SAMBA_DNS_FORWARDER=8.8.8.8
    ports:
      - "172.20.0.1:53:53/tcp"
      - "172.20.0.1:53:53/udp"
      - "88:88/tcp"
      - "88:88/udp"
      - "135:135/tcp"
      - "389:389/tcp"
      - "389:389/udp"
      - "445:445/tcp"
      - "464:464/tcp"
      - "464:464/udp"
      - "636:636/tcp"
      - "3268:3268/tcp"
      - "3269:3269/tcp"
    volumes:
      - samba-dc1-data:/data
    dns:
      - 127.0.0.1
    networks:
      samba-net:
        ipv4_address: 172.20.0.10

  # Replica DC (optional — start with: docker compose --profile replica up -d)
  samba-ad-dc-replica:
    build:
      context: .
      dockerfile: samba-ad-dc/Dockerfile
    container_name: samba-dc2
    hostname: dc2
    domainname: samdom.example.com
    restart: unless-stopped
    privileged: true
    profiles:
      - replica
    depends_on:
      - samba-ad-dc
    environment:
      - SAMBA_REALM=SAMDOM.EXAMPLE.COM
      - SAMBA_DOMAIN=SAMDOM
      - SAMBA_ADMIN_PASSWORD=P@ssw0rd123!
      - SAMBA_DNS_FORWARDER=8.8.8.8
      - SAMBA_JOIN_AS_DC=true
      - SAMBA_PRIMARY_DC=dc1.samdom.example.com
    ports:
      - "10053:53/tcp"
      - "10053:53/udp"
      - "10088:88/tcp"
      - "10389:389/tcp"
      - "10445:445/tcp"
      - "10636:636/tcp"
      - "13268:3268/tcp"
    volumes:
      - samba-dc2-data:/data
    dns:
      - 172.20.0.10
    networks:
      samba-net:
        ipv4_address: 172.20.0.11

networks:
  samba-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  samba-dc1-data:
  samba-dc2-data:
