services:
  samba-conductor:
    build:
      context: ../..
      dockerfile: docker/all-in-one/Dockerfile
    container_name: samba-conductor
    hostname: dc1
    domainname: samdom.example.com
    restart: unless-stopped
    privileged: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE # Bind privileged ports (53, 88, 389, 445, 636, etc.)
      - SETUID           # Samba impersonates AD users
      - SETGID           # Samba impersonates AD groups
      - CHOWN            # Provisioning sets ownership on sysvol/netlogon files
      - FOWNER           # Modify file attributes regardless of owner
      - DAC_OVERRIDE     # smbd accesses files across user ownership boundaries
    environment:
      - SAMBA_REALM=SAMDOM.EXAMPLE.COM
      - SAMBA_DOMAIN=SAMDOM
      - SAMBA_ADMIN_PASSWORD=P@ssw0rd123!
      - SAMBA_DNS_FORWARDER=8.8.8.8
      - ROOT_URL=http://localhost:3000
      - PORT=3000
    ports:
      - "3000:3000"
      - "53:53/tcp"
      - "53:53/udp"
      - "88:88/tcp"
      - "88:88/udp"
      - "135:135/tcp"
      - "389:389/tcp"
      - "389:389/udp"
      - "445:445/tcp"
      - "464:464/tcp"
      - "464:464/udp"
      - "636:636/tcp"
      - "3268:3268/tcp"
      - "3269:3269/tcp"
    volumes:
      - conductor-data:/data
    dns:
      - 127.0.0.1

volumes:
  conductor-data:
