# Grafana + Samba Conductor OAuth2 Example
#
# Prerequisites:
#   1. Samba DC running: cd docker && docker compose up -d
#   2. Meteor app running: cd web && meteor npm start
#   3. OAuth client created in Admin > OAuth Clients with:
#      - Redirect URI: http://localhost:3001/login/generic_oauth
#      - Scopes: openid, profile, email, groups
#   4. Update CLIENT_ID and CLIENT_SECRET below with the values from step 3
#   5. Ensure the AD user has the 'mail' attribute set (required for Grafana login)
#
# Usage:
#   cd docs/examples
#   docker compose -f docker-compose.grafana.yml up -d
#
# Access:
#   Grafana: http://localhost:3001 (admin/admin)
#   Click "Sign in with Samba Conductor" to test OAuth2

services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-oauth-example
    ports:
      - "3001:3000"
    environment:
      # Grafana admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

      # OAuth2 — Samba Conductor
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Samba Conductor
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=REPLACE_WITH_YOUR_CLIENT_ID
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=REPLACE_WITH_YOUR_CLIENT_SECRET
      # auth_url: accessed by the BROWSER — use localhost
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=http://localhost:4080/oauth/authorize
      # token_url and api_url: accessed by the GRAFANA CONTAINER — use host.docker.internal
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=http://host.docker.internal:4080/oauth/token
      - GF_AUTH_GENERIC_OAUTH_API_URL=http://host.docker.internal:4080/oauth/userinfo
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email groups
      - GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH=email
      - GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH=login
      - GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH=name
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true

      # Map AD groups to Grafana roles
      # Domain Admins → GrafanaAdmin, everyone else → Viewer
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(groups[*], 'Domain Admins') && 'GrafanaAdmin' || 'Viewer'
      - GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN=true

      # Server URL (must match how you access Grafana in the browser)
      - GF_SERVER_ROOT_URL=http://localhost:3001

      # Cookie settings for OAuth state
      - GF_SECURITY_COOKIE_SAMESITE=lax
      - GF_SECURITY_COOKIE_SECURE=false

    extra_hosts:
      # Required on Linux for container-to-host networking
      - "host.docker.internal:host-gateway"
